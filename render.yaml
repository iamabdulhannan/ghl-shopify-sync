# Render.com deployment — managed Postgres + auto-deploy from GitHub.
# Use this if you want a real Postgres DB instead of SQLite.
#
# IMPORTANT: To use this config, change prisma/schema.prisma:
#   provider = "sqlite"   →   provider = "postgresql"
# Then commit and push. Render will run prisma migrate deploy on each release.
#
# Setup:
#   1. Push this repo to GitHub
#   2. Render dashboard → Blueprint → connect this repo → render.yaml is auto-detected
#   3. Render creates the web service + Postgres DB automatically
#   4. Add secrets in dashboard: SHOPIFY_API_KEY, SHOPIFY_API_SECRET, SHOPIFY_APP_URL
#   5. Update shopify.app.toml `application_url` to your Render URL
#   6. Run `npm run deploy` from local to push the new URL to Partner Dashboard

services:
  - type: web
    name: ghl-sync-shopify
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build && npx prisma generate && npx prisma migrate deploy
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SCOPES
        value: read_orders,read_customers,read_products
      - key: DATABASE_URL
        fromDatabase:
          name: ghl-sync-db
          property: connectionString
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false

databases:
  - name: ghl-sync-db
    plan: starter
    databaseName: ghl_sync
    user: ghl_sync
